<style>
  body { font-family: Inter, sans-serif; margin: 0; padding: 16px; background: #18181b; color: #fff; }
  button { display: block; width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: none; background: #4361EE; color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; }
  button:hover { background: #3451D1; }
  p { font-size: 11px; color: #9CA3AF; line-height: 1.4; }
</style>
<button id="foundations">Construir Foundations</button>
<button id="components">Construir Components</button>
<button id="patterns">Construir Patterns</button>
<button id="changelog">Construir Changelog</button>
<p>Cada botão desenha só a página correspondente. Rodar de novo duplica os frames (não os styles). Rode Components antes de Patterns pra reaproveitar os componentes já criados.</p>
<script>
  document.getElementById('foundations').onclick = () =>
    parent.postMessage({ pluginMessage: { type: 'build-foundations' } }, '*');
  document.getElementById('components').onclick = () =>
    parent.postMessage({ pluginMessage: { type: 'build-components' } }, '*');
  document.getElementById('patterns').onclick = () =>
    parent.postMessage({ pluginMessage: { type: 'build-patterns' } }, '*');
  document.getElementById('changelog').onclick = () =>
    parent.postMessage({ pluginMessage: { type: 'build-changelog' } }, '*');
</script>
